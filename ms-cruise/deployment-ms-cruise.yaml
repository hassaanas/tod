apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-cruise
  namespace: tod
  labels:
    app: ms-cruise-obu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-cruise-obu
  template:
    metadata:
      labels:
        app: ms-cruise-obu
    spec:
      volumes:
        - name: ms-cruise-code
          persistentVolumeClaim:
            claimName: pvc-tod-code
      containers:
      - image: localhost:5000/ms-tod-app:v1
        name: ms-cruise
        resources:
          requests:
            memory: "50Mi"
            cpu: "0.5"
          limits:
            memory: "100Mi"
            cpu: "1"
        volumeMounts:
        - name: ms-cruise-code
          mountPath: /home/tod
        env:
          - name: BROKERIP
            valueFrom:
              configMapKeyRef:
                name: ms-ip
                key: BROKERIP
          - name: BROKERPORT
            valueFrom:
              configMapKeyRef:
                name: ms-ip
                key: BROKERPORT
        args:
          - "/bin/bash"
          - "-c"
          - |
            #echo "Running app /home/tod/speed-obu.py";
            #/home/tod/speed-obu.py;
            while true; do echo sleeping; date; sleep 86400; done;
